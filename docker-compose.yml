services:

  # ── Athena: FastAPI + Groq + Notion agent ────────────────────────────────────
  athena:
    build: ./athena
    container_name: athena-api
    ports:
      - "8000:8000"
    env_file:
      - ./athena/.env          # NOTION_TOKEN, GROQ_API_KEY, NOTION_PARENT_PAGE_ID
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Apex: Expo Metro bundler (serves JS to mobile devices) ───────────────────
  apex-metro:
    build: ./apex_app
    container_name: apex-metro
    tty: true
    stdin_open: true
    ports:
      - "8081:8081"    # Metro bundler (JS bundle)
      - "19000:19000"  # Expo Go protocol
      - "19001:19001"  # Expo DevTools
      - "19002:19002"  # Expo DevTools (secondary)
    environment:
      # HOST_IP: real LAN IP of the machine running Docker.
      # Phones use this to reach both the Metro server and the Athena API.
      # Set it in the root .env file (copy .env.example → .env).
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_IP:?Set HOST_IP in the root .env file}
      - EXPO_PUBLIC_API_URL=http://${HOST_IP}:8000
    volumes:
      - ./apex_app:/app
      - apex_node_modules:/app/node_modules   # keep Linux binaries isolated from host
    restart: unless-stopped
    depends_on:
      athena:
        condition: service_healthy

volumes:
  apex_node_modules:
